version = '2'

[run]
go = '1.24'
tests = true

[linters]
enable = [
  'containedctx',
  'contextcheck',
  'decorder',
  'errname',
  'errorlint',
  'staticcheck',
  'whitespace'
]

[linters.exclusions]
generated = 'lax'
presets = [
  'comments',
  'common-false-positives',
  'legacy',
  'std-error-handling'
]
paths = [
  'third_party$',
  'builtin$',
  'examples$'
]

[formatters]
enable = [
  'gofmt',
  'gofumpt'
]

[formatters.exclusions]
generated = 'lax'
paths = [
  'third_party$',
  'builtin$',
  'examples$'
]

## False positive, strings.Builder cannot be used as io.Writer for fmt.Fprintf
[[linters.exclusions.rules]]
linters = [
    'staticcheck'
]
path = 'internal/server/sendmail.go'
text = 'QF1012:'